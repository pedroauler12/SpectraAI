# config.yaml — Configurações globais do A11
# Usado por todos os scripts de src/ para garantir reprodutibilidade.

# ── Reprodutibilidade ──────────────────────────────────────────────────────────
seed: 42

# ── Caminhos ──────────────────────────────────────────────────────────────────
paths:
  data_raw:        data/raw
  data_processed:  data/processed
  outputs_metrics: outputs/metrics
  outputs_models:  outputs/models
  outputs_viz:     outputs/visualizations
  outputs_preds:   outputs/predictions
  notebooks:       notebooks

# ── Dados ─────────────────────────────────────────────────────────────────────
data:
  image_size: [64, 64]      # altura x largura dos tiles
  num_bands: 9              # bandas espectrais ASTER
  test_size: 0.15
  val_size: 0.15

# ── Modelo ────────────────────────────────────────────────────────────────────
model:
  backbone: resnet50
  num_classes: 2
  dropout: 0.5

# ── Treinamento ───────────────────────────────────────────────────────────────
training:
  epochs: 50
  batch_size: 32
  learning_rate: 1.0e-4
  early_stopping_patience: 10

# ── Avaliação ─────────────────────────────────────────────────────────────────
evaluation:
  threshold_default: 0.5
  metrics: [accuracy, f1, roc_auc, precision, recall]
