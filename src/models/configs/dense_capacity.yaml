# Pilar: Capacidade de Decisão - Variação de Dense Units
# Objetivo científico: Medir se uma camada densa maior (mais neurônios) melhora a capacidade de classificação.
# Hipótese: Mais unidades densas = mais capacidade de aprender representações não-lineares complexas.

model:
  input_shape: [128, 128, 9]
  num_classes: 2
  
  # Filtros e kernel (mantém baseline)
  filters: [32, 64]
  kernel_size: 3
  pool_size: 2
  
  # Regularization (igual ao baseline)
  l2_regularizer: 0.001
  conv_dropout_rate: 0.2
  dense_dropout_rate: 0.5
  
  # Dense layers - VARIAÇÃO: aumentado de 128
  dense_units: 256              # MAIOR CAPACIDADE DE DECISÃO

training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.001
  validation_split: 0.2
  optimizer: adam

data:
  dataset_path: data/pixels_dataset.csv
  codes_path: data/extracted_codes.json
  normalizer_path: outputs/a04_cnn_data_prep/cnn_normalizer_zscore.npz
  normalization_method: zscore

output:
  models_dir: models/trained_models/
  logs_dir: outputs/training_logs/
  save_model: true
  save_history: true
