# Arquitetura (Model) - Filtros Aumentados Muito
# Objetivo: Testar modelo com ALTA capacidade de representação
# Hipótese: [128, 256] pode capturar padrões muito complexos mas risco de overfitting

model:
  input_shape: [128, 128, 9]
  num_classes: 2
  filters: [128, 256]          # MUITO AUMENTADO - model com alta capacidade
  kernel_size: 3
  pool_size: 2
  l2_regularizer: 0.001
  conv_dropout_rate: 0.2
  dense_dropout_rate: 0.5
  dense_units: 128

training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.001
  validation_split: 0.2
  optimizer: adam

data:
  dataset_path: data/pixels_dataset.csv
  codes_path: data/extracted_codes.json
  normalizer_path: outputs/a04_cnn_data_prep/cnn_normalizer_zscore.npz
  normalization_method: zscore

output:
  models_dir: models/trained_models/
  logs_dir: outputs/training_logs/
  save_model: true
  save_history: true
