# Arquitetura (Model) - Kernel Muito Grande (7x7)
# Objetivo: Testar se kernels 7x7 capturam padrões muito amplos (receptive field grande)
# Hipótese: 7x7 pode capturar relações espaciais amplas mas reduz resolução rápido

model:
  input_shape: [128, 128, 9]
  num_classes: 2
  filters: [32, 64]
  kernel_size: 7               # MUITO GRANDE - receptive field amplo
  pool_size: 2
  l2_regularizer: 0.001
  conv_dropout_rate: 0.2
  dense_dropout_rate: 0.5
  dense_units: 128

training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.001
  validation_split: 0.2
  optimizer: adam

data:
  dataset_path: data/pixels_dataset.csv
  codes_path: data/extracted_codes.json
  normalizer_path: outputs/a04_cnn_data_prep/cnn_normalizer_zscore.npz
  normalization_method: zscore

output:
  models_dir: outputs/trained_models/
  logs_dir: outputs/training_logs/
  save_model: true
  save_history: true
