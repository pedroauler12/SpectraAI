# ABLAÇÃO: Input reduzido 64x64
# Arquitetura: padrão, mas Input 64×64 ao invés de 128×128
# Objetivo: Medir impacto de dimensionalidade da entrada

model:
  input_shape: [64, 64, 9]  # 🔴 ABLAÇÃO: reduzir de 128 para 64
  num_classes: 2
  filters: [32, 64]
  kernel_size: 3
  pool_size: 2
  dense_units: 128
  l2_regularizer: 0.001
  conv_dropout_rate: 0.2
  dense_dropout_rate: 0.5

training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.001
  validation_split: 0.2
  optimizer: adam

data:
  dataset_path: data/pixels_dataset.csv
  codes_path: data/extracted_codes.json
  normalizer_path: outputs/a04_cnn_data_prep/cnn_normalizer_zscore.npz
  normalization_method: zscore
  resize_input: true  # Flag para fazer resize dos dados

output:
  models_dir: models/trained_models/
  logs_dir: outputs/training_logs/
  save_model: true
  save_history: true
  base_dir: ablacao_input_64x64
