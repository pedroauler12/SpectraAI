# E4 - Deeper Architecture: +1 camada Conv2D
# Hipótese: camada extra captura features hierárquicas mais complexas
# Baseline: [32, 64] -> Deeper: [32, 64, 128]

model:
  input_shape: [128, 128, 9]
  num_classes: 2

  # Convolutional layers - 3 blocos (vs. 2 no baseline)
  filters: [32, 64, 128]
  kernel_size: 3
  pool_size: 2

  # Regularization (mesma do baseline para isolar efeito da profundidade)
  l2_regularizer: 0.001
  conv_dropout_rate: 0.2
  dense_dropout_rate: 0.5

  # Dense layers
  dense_units: 128

training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.001
  validation_split: 0.2
  optimizer: adam

data:
  dataset_path: data/pixels_dataset.csv
  codes_path: data/extracted_codes.json
  normalizer_path: outputs/a04_cnn_data_prep/cnn_normalizer_zscore.npz
  normalization_method: zscore

output:
  models_dir: outputs/trained_models/
  logs_dir: outputs/training_logs/
  save_model: true
  save_history: true
